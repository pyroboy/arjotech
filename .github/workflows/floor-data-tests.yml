name: Floor Data Tests

# Run on every commit/push and every PR targeting main or develop.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit & Integration Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/arjostyle-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.1'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Run floor data unit & integration tests
        run: pnpm test:unit
        env:
          # No real DB/KV needed — tests use in-memory mocks
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: apps/arjostyle-web/test-results/
          retention-days: 7

  # Optional: run E2E tests only on PRs to main (not on every commit — requires browser + running dev server)
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main branch, skip on regular pushes to feature branches
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: unit-tests

    defaults:
      run:
        working-directory: apps/arjostyle-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.1'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Playwright E2E tests (headless)
        run: npx playwright test --project=chromium
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Override headless setting for CI (vite preview serves built app)
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/arjostyle-web/playwright-report/
          retention-days: 7
