name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags 2>/dev/null || echo "v0.1.0")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Inject version into wrangler.toml
        run: |
          sed -i "s/^APP_VERSION = \".*\"/APP_VERSION = \"${{ env.VERSION }}\"/" apps/arjostyle-web/wrangler.toml

      - name: Build arjostyle-web
        run: |
          cd apps/arjostyle-web
          pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: arjostyle-web
          directory: apps/arjostyle-web/.svelte-kit/cloudflare
          gitSourceDirectory: apps/arjostyle-web
          wranglerConfig: apps/arjostyle-web/wrangler.toml
