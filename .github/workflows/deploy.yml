name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Extract version
        id: version
        run: |
          VERSION=$(git describe --tags 2>/dev/null || echo "v0.1.0")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_ENV

      - name: Build arjostyle-web
        env:
          APP_VERSION: ${{ env.VERSION }}
          PUBLIC_APP_VERSION: ${{ env.VERSION }}
        run: |
          cd apps/arjostyle-web
          pnpm build

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/arjostyle-web/.svelte-kit/cloudflare --project-name=arjostyle-web
        env:
          APP_VERSION: ${{ env.VERSION }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
